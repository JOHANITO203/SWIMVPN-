version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: swimvpn_db
    environment:
      POSTGRES_USER: swim_user
      POSTGRES_PASSWORD: swim_password
      POSTGRES_DB: swimvpn_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swimvpn_api
    environment:
      DATABASE_URL: postgresql://swim_user:swim_password@db:5432/swimvpn_db?schema=public
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
