version: '3.8'

# Docker Compose configuration for SWIMVPN+ production stack
# Compatible with Dockploy deployment orchestration

# ===============================
# NETWORKS
# ===============================
networks:
  swimvpn-network:
    driver: bridge
    name: swimvpn-network
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ===============================
# VOLUMES
# ===============================
volumes:
  swimvpn-pgdata:
    name: swimvpn-pgdata
  swimvpn-redisdata:
    name: swimvpn-redisdata
  swimvpn-wireguard-config:
    name: swimvpn-wireguard-config
  swimvpn-traefik-certificates:
    name: swimvpn-traefik-certificates

# ===============================
# X-EXTENSIONS (Common configurations)
# ===============================
x-common-build: &common-build
  context: ./backend
  dockerfile: Dockerfile
  target: runtime

x-common-environment: &common-environment
  NODE_ENV: ${NODE_ENV:-production}
  DATABASE_URL: postgresql://${POSTGRES_USER:-swim_user}:${POSTGRES_PASSWORD:-swim_password}@db:5432/${POSTGRES_DB:-swimvpn_db}?schema=public
  REDIS_URL: redis://redis:6379
  JWT_SECRET: ${JWT_SECRET:-SWIM_VPN_SUPER_SECRET_CHANGE_IN_PRODUCTION}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
  ADMIN_CHAT_ID: ${ADMIN_CHAT_ID:-0}
  # Service discovery URLs
  GATEWAY_SERVICE_URL: http://gateway-service:3000
  CUSTOMER_SERVICE_URL: http://customer-order-service:3001
  INVENTORY_SERVICE_URL: http://inventory-delivery-service:3002
  ADMIN_SERVICE_URL: http://admin-control-service:3003
  VPN_CONFIG_SERVICE_URL: http://vpn-config-engine-service:3004
  STORE_SERVICE_URL: http://store-engine-service:3005

x-common-deploy: &common-deploy
  restart: unless-stopped
  resources:
    limits:
      memory: 512M
      cpus: '0.5'
    reservations:
      memory: 256M
      cpus: '0.25'

x-common-healthcheck: &common-healthcheck
  test: ["CMD", "node", "-e", "fetch('http://localhost:${PORT}/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 60s

# ===============================
# SERVICES
# ===============================
services:
  # ====================
  # DATABASE LAYER
  # ====================
  db:
    image: postgres:15-alpine
    container_name: swimvpn-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-swim_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swim_password}
      POSTGRES_DB: ${POSTGRES_DB:-swimvpn_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - swimvpn-pgdata:/var/lib/postgresql/data
    networks:
      - swimvpn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-swim_user} -d ${POSTGRES_DB:-swimvpn_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy: *common-deploy
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB

  # ====================
  # CACHE LAYER (Optional but recommended)
  # ====================
  redis:
    image: redis:7-alpine
    container_name: swimvpn-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - swimvpn-redisdata:/data
    networks:
      - swimvpn-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy: *common-deploy
    depends_on:
      - db

  # ====================
  # DATABASE ADMIN (Development/Internal only)
  # ====================
  pgadmin:
    image: dpage/pgadmin4
    container_name: swimvpn-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@swimvpn.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin_password}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    networks:
      - swimvpn-network
    restart: unless-stopped
    depends_on:
      - db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=Host(`${PGADMIN_DOMAIN:-pgadmin.swimvpn.com}`)"
      - "traefik.http.routers.pgadmin.entrypoints=websecure"
      - "traefik.http.routers.pgadmin.tls.certresolver=letsencrypt"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"

  # ====================
  # API GATEWAY
  # ====================
  gateway-service:
    build: *common-build
    container_name: swimvpn-gateway
    command: node dist/apps/gateway-service/main
    environment:
      <<: *common-environment
      PORT: 3000
      SERVICE_NAME: gateway-service
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - swimvpn-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
    deploy: *common-deploy
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=Host(`${API_DOMAIN:-api.swimvpn.com}`)"
      - "traefik.http.routers.gateway.entrypoints=websecure"
      - "traefik.http.routers.gateway.tls.certresolver=letsencrypt"
      - "traefik.http.services.gateway.loadbalancer.server.port=3000"

  # ====================
  # CUSTOMER ORDER SERVICE
  # ====================
  customer-order-service:
    build: *common-build
    container_name: swimvpn-customer-order
    command: node dist/apps/customer-order-service/main
    environment:
      <<: *common-environment
      PORT: 3001
      SERVICE_NAME: customer-order-service
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - swimvpn-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {if(r.statusCode===200)process.exit(0);process.exit(1)}).on('error',()=>process.exit(1))"]
    deploy: *common-deploy
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ====================
  # INVENTORY DELIVERY SERVICE
  # ====================
  inventory-delivery-service:
    build: *common-build
    container_name: swimvpn-inventory-delivery
    command: node dist/apps/inventory-delivery-service/main
    environment:
      <<: *common-environment
      PORT: 3002
      SERVICE_NAME: inventory-delivery-service
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - swimvpn-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => {if(r.statusCode===200)process.exit(0);process.exit(1)}).on('error',()=>process.exit(1))"]
    deploy: *common-deploy
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      vpn-config-engine-service:
        condition: service_started

  # ====================
  # ADMIN CONTROL SERVICE
  # ====================
  admin-control-service:
    build: *common-build
    container_name: swimvpn-admin-control
    command: node dist/apps/admin-control-service/main
    environment:
      <<: *common-environment
      PORT: 3003
      SERVICE_NAME: admin-control-service
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-ADMIN_SUPER_SECRET_CHANGE_IN_PRODUCTION}
    networks:
      - swimvpn-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health', (r) => {if(r.statusCode===200)process.exit(0);process.exit(1)}).on('error',()=>process.exit(1))"]
    deploy: *common-deploy
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ====================
  # VPN CONFIG ENGINE SERVICE
  # ====================
  vpn-config-engine-service:
    build: *common-build
    container_name: swimvpn-vpn-engine
    command: node dist/apps/vpn-config-engine-service/main
    environment:
      <<: *common-environment
      PORT: 3004
      SERVICE_NAME: vpn-config-engine-service
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Config parsing settings
      CONFIG_VALIDATION_STRICT: ${CONFIG_VALIDATION_STRICT:-true}
      MAX_CONFIG_SIZE_KB: ${MAX_CONFIG_SIZE_KB:-1024}
    networks:
      - swimvpn-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/health', (r) => {if(r.statusCode===200)process.exit(0);process.exit(1)}).on('error',()=>process.exit(1))"]
    deploy: *common-deploy
    depends_on:
      db:
        condition: service_healthy

  # ====================
  # STORE ENGINE SERVICE
  # ====================
  store-engine-service:
    build: *common-build
    container_name: swimvpn-store-engine
    command: node dist/apps/store-engine-service/main
    environment:
      <<: *common-environment
      PORT: 3005
      SERVICE_NAME: store-engine-service
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-RUB}
    networks:
      - swimvpn-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "node", "-e", "fetch('http://localhost:3005/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
    deploy: *common-deploy
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ====================
  # VPN SERVER (WireGuard)
  # ====================
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: swimvpn-wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - SERVERURL=${WIREGUARD_SERVER_URL:-vpn.swimvpn.com}
      - SERVERPORT=${WIREGUARD_SERVER_PORT:-51820}
      - PEERS=${WIREGUARD_PEERS:-10}
      - PEERDNS=${WIREGUARD_PEER_DNS:-1.1.1.1}
      - INTERNAL_SUBNET=${WIREGUARD_INTERNAL_SUBNET:-10.13.13.0}
      - ALLOWEDIPS=${WIREGUARD_ALLOWED_IPS:-0.0.0.0/0}
      - LOG_CONFS=${WIREGUARD_LOG_CONFS:-true}
    volumes:
      - swimvpn-wireguard-config:/config
      - /lib/modules:/lib/modules
    ports:
      - "${WIREGUARD_PORT:-51820}:51820/udp"
    networks:
      - swimvpn-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wg", "show"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - gateway-service

  # ====================
  # REVERSE PROXY (Traefik)
  # ====================
  traefik:
    image: traefik:v3.0
    container_name: swimvpn-traefik
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL:-admin@swimvpn.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8081:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - swimvpn-traefik-certificates:/letsencrypt
    networks:
      - swimvpn-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Dashboard protection
      - "traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DASHBOARD_DOMAIN:-traefik.swimvpn.com}`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH:-admin:$$apr1$$jIKW.BdN$$X7Q6cF5u5e6u5e6u5e6u5e/}"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
