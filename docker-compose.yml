networks:
  swimvpn-network:
    driver: bridge

volumes:
  swimvpn-pgdata:

services:
  db:
    image: postgres:15-alpine
    container_name: swimvpn-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-swim_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swim_password}
      POSTGRES_DB: ${POSTGRES_DB:-swimvpn_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - swimvpn-pgdata:/var/lib/postgresql/data
    networks:
      - swimvpn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-swim_user} -d ${POSTGRES_DB:-swimvpn_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: swimvpn-gateway
    command: node dist/apps/gateway-service/main
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER:-swim_user}:${POSTGRES_PASSWORD:-swim_password}@db:5432/${POSTGRES_DB:-swimvpn_db}?schema=public
      CUSTOMER_SERVICE_HOST: customer-order-service
      INVENTORY_SERVICE_HOST: inventory-delivery-service
      ADMIN_SERVICE_HOST: admin-control-service
      VPN_CONFIG_SERVICE_HOST: vpn-config-engine-service
      STORE_SERVICE_HOST: store-engine-service
      JWT_SECRET: ${JWT_SECRET:-SWIM_VPN_SUPER_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID:-0}
      DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-RUB}
    networks:
      - swimvpn-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/v1/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  customer-order-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: swimvpn-customer-order
    command: node dist/apps/customer-order-service/main
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-swim_user}:${POSTGRES_PASSWORD:-swim_password}@db:5432/${POSTGRES_DB:-swimvpn_db}?schema=public
      INVENTORY_SERVICE_HOST: inventory-delivery-service
      JWT_SECRET: ${JWT_SECRET:-SWIM_VPN_SUPER_SECRET}
    networks:
      - swimvpn-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const s=net.createConnection(3001,'127.0.0.1');s.on('connect',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000);"]
      interval: 30s
      timeout: 10s
      retries: 3

  inventory-delivery-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: swimvpn-inventory-delivery
    command: node dist/apps/inventory-delivery-service/main
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-swim_user}:${POSTGRES_PASSWORD:-swim_password}@db:5432/${POSTGRES_DB:-swimvpn_db}?schema=public
      VPN_CONFIG_SERVICE_HOST: vpn-config-engine-service
      ADMIN_SERVICE_HOST: admin-control-service
    networks:
      - swimvpn-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const s=net.createConnection(3002,'127.0.0.1');s.on('connect',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000);"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin-control-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: swimvpn-admin-control
    command: node dist/apps/admin-control-service/main
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-swim_user}:${POSTGRES_PASSWORD:-swim_password}@db:5432/${POSTGRES_DB:-swimvpn_db}?schema=public
      INVENTORY_SERVICE_HOST: inventory-delivery-service
      CUSTOMER_SERVICE_HOST: customer-order-service
      JWT_SECRET: ${JWT_SECRET:-SWIM_VPN_SUPER_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID:-0}
    networks:
      - swimvpn-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const s=net.createConnection(3003,'127.0.0.1');s.on('connect',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000);"]
      interval: 30s
      timeout: 10s
      retries: 3

  vpn-config-engine-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: swimvpn-vpn-engine
    command: node dist/apps/vpn-config-engine-service/main
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-swim_user}:${POSTGRES_PASSWORD:-swim_password}@db:5432/${POSTGRES_DB:-swimvpn_db}?schema=public
    networks:
      - swimvpn-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const s=net.createConnection(3004,'127.0.0.1');s.on('connect',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000);"]
      interval: 30s
      timeout: 10s
      retries: 3

  store-engine-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: swimvpn-store-engine
    command: node dist/apps/store-engine-service/main
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-swim_user}:${POSTGRES_PASSWORD:-swim_password}@db:5432/${POSTGRES_DB:-swimvpn_db}?schema=public
      DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-RUB}
    networks:
      - swimvpn-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const s=net.createConnection(3005,'127.0.0.1');s.on('connect',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000);"]
      interval: 30s
      timeout: 10s
      retries: 3
