networks:
  private:
    driver: bridge
    name: swimvpn-private
  dokploy-public:
    external: true
    name: dokploy-network

volumes:
  swimvpn-pgdata:

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - swimvpn-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required} -d ${POSTGRES_DB:?POSTGRES_DB is required}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    mem_limit: 384m
    cpus: "0.35"
    networks:
      - private

  prisma-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    command: ["npm", "run", "prisma:migrate:deploy"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    mem_limit: 128m
    cpus: "0.20"
    networks:
      - private

  prisma-seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    command: ["npm", "run", "prisma:seed"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
    depends_on:
      db:
        condition: service_healthy
      prisma-migrate:
        condition: service_completed_successfully
    restart: "no"
    mem_limit: 256m
    cpus: "0.20"
    networks:
      - private

  vpn-config-engine-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    command: ["node", "dist/apps/vpn-config-engine-service/main"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
      SWIMVPN_CRYPT1_KEY_BASE64: ${SWIMVPN_CRYPT1_KEY_BASE64:-}
    depends_on:
      db:
        condition: service_healthy
      prisma-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "const n=require('net');const s=n.createConnection(3004,'127.0.0.1');const f=()=>{s.destroy();process.exit(1)};s.setTimeout(2000);s.on('connect',()=>{s.destroy();process.exit(0)});s.on('timeout',f);s.on('error',f);"]
      interval: 20s
      timeout: 6s
      retries: 5
      start_period: 25s
    restart: unless-stopped
    mem_limit: 160m
    cpus: "0.20"
    networks:
      - private

  inventory-delivery-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    command: ["node", "dist/apps/inventory-delivery-service/main"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
      VPN_CONFIG_SERVICE_HOST: vpn-config-engine-service
      ADMIN_SERVICE_HOST: admin-control-service
      NOTIFICATION_SERVICE_HOST: notification-bot-service
    depends_on:
      db:
        condition: service_healthy
      prisma-seed:
        condition: service_completed_successfully
      vpn-config-engine-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const n=require('net');const t=[[3002,'127.0.0.1'],[5432,'db'],[3004,'vpn-config-engine-service']];let i=0;const c=()=>{if(i===t.length)process.exit(0);const [p,h]=t[i++];const s=n.createConnection(p,h);const f=()=>{s.destroy();process.exit(1)};s.setTimeout(2000);s.on('connect',()=>{s.destroy();c()});s.on('timeout',f);s.on('error',f)};c();"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    mem_limit: 192m
    cpus: "0.25"
    networks:
      - private

  notification-bot-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    command: ["node", "dist/apps/notification-bot-service/main"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      NOTIFICATION_BOT_TOKEN: ${NOTIFICATION_BOT_TOKEN:-}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID:?ADMIN_CHAT_ID is required}
      PAYMENT_REVIEW_CHAT_ID: ${PAYMENT_REVIEW_CHAT_ID:-}
      PAYMENT_BOT_USERNAME: ${PAYMENT_BOT_USERNAME:-}
      MANUAL_CARD_NUMBER: ${MANUAL_CARD_NUMBER:-}
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY is required}
      MAILER_FROM_EMAIL: ${MAILER_FROM_EMAIL:-support@swimvpn.pro}
      MAILER_FROM_NAME: ${MAILER_FROM_NAME:-SWIMVPN+ Support}
    depends_on:
      db:
        condition: service_healthy
      prisma-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "const n=require('net');const t=[[3006,'127.0.0.1'],[5432,'db']];let i=0;const c=()=>{if(i===t.length)process.exit(0);const [p,h]=t[i++];const s=n.createConnection(p,h);const f=()=>{s.destroy();process.exit(1)};s.setTimeout(2000);s.on('connect',()=>{s.destroy();c()});s.on('timeout',f);s.on('error',f)};c();"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    mem_limit: 192m
    cpus: "0.20"
    networks:
      - private

  customer-order-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    command: ["node", "dist/apps/customer-order-service/main"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
      INVENTORY_SERVICE_HOST: inventory-delivery-service
      VPN_CONFIG_SERVICE_HOST: vpn-config-engine-service
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      NOTIFICATION_BOT_TOKEN: ${NOTIFICATION_BOT_TOKEN:-}
      PAYMENT_BOT_TOKEN: ${PAYMENT_BOT_TOKEN:-}
      CRYPTO_PAY_API_TOKEN: ${CRYPTO_PAY_API_TOKEN:-}
      CRYPTO_PAY_API_KEY: ${CRYPTO_PAY_API_KEY:-}
      CRYPTO_PAY_API_BASE_URL: ${CRYPTO_PAY_API_BASE_URL:-https://pay.crypt.bot/api}
      CRYPTO_PAY_ACCEPTED_ASSETS: ${CRYPTO_PAY_ACCEPTED_ASSETS:-USDT,TON,BTC,ETH,TRX,LTC,BNB,USDC}
      CRYPTO_PAY_INVOICE_EXPIRES_IN: ${CRYPTO_PAY_INVOICE_EXPIRES_IN:-1800}
      PAYMENT_BOT_USERNAME: ${PAYMENT_BOT_USERNAME:-}
    depends_on:
      db:
        condition: service_healthy
      prisma-seed:
        condition: service_completed_successfully
      inventory-delivery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const n=require('net');const t=[[3001,'127.0.0.1'],[5432,'db'],[3002,'inventory-delivery-service']];let i=0;const c=()=>{if(i===t.length)process.exit(0);const [p,h]=t[i++];const s=n.createConnection(p,h);const f=()=>{s.destroy();process.exit(1)};s.setTimeout(2000);s.on('connect',()=>{s.destroy();c()});s.on('timeout',f);s.on('error',f)};c();"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    mem_limit: 192m
    cpus: "0.25"
    networks:
      - private

  store-engine-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    command: ["node", "dist/apps/store-engine-service/main"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
      DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-RUB}
    depends_on:
      db:
        condition: service_healthy
      prisma-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "const n=require('net');const t=[[3005,'127.0.0.1'],[5432,'db']];let i=0;const c=()=>{if(i===t.length)process.exit(0);const [p,h]=t[i++];const s=n.createConnection(p,h);const f=()=>{s.destroy();process.exit(1)};s.setTimeout(2000);s.on('connect',()=>{s.destroy();c()});s.on('timeout',f);s.on('error',f)};c();"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    mem_limit: 160m
    cpus: "0.20"
    networks:
      - private

  admin-control-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    command: ["node", "dist/apps/admin-control-service/main"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
      INVENTORY_SERVICE_HOST: inventory-delivery-service
      CUSTOMER_SERVICE_HOST: customer-order-service
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?ADMIN_JWT_SECRET is required}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID:?ADMIN_CHAT_ID is required}
      ADMIN_SUPPORT_BOT_TOKEN: ${ADMIN_SUPPORT_BOT_TOKEN:?ADMIN_SUPPORT_BOT_TOKEN is required}
      ADMIN_SUPPORT_CHAT_ID: ${ADMIN_SUPPORT_CHAT_ID:-1003912107958}
      ADMIN_SUPPORT_REPORT_CHAT_ID: ${ADMIN_SUPPORT_REPORT_CHAT_ID:-}
      ADMIN_SUPPORT_DEFAULT_LANGUAGE: ${ADMIN_SUPPORT_DEFAULT_LANGUAGE:-ru}
      ADMIN_SUPPORT_FALLBACK_LANGUAGE: ${ADMIN_SUPPORT_FALLBACK_LANGUAGE:-en}
    depends_on:
      db:
        condition: service_healthy
      prisma-seed:
        condition: service_completed_successfully
      customer-order-service:
        condition: service_healthy
      inventory-delivery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const n=require('net');const t=[[3003,'127.0.0.1'],[5432,'db'],[3001,'customer-order-service'],[3002,'inventory-delivery-service']];let i=0;const c=()=>{if(i===t.length)process.exit(0);const [p,h]=t[i++];const s=n.createConnection(p,h);const f=()=>{s.destroy();process.exit(1)};s.setTimeout(2000);s.on('connect',()=>{s.destroy();c()});s.on('timeout',f);s.on('error',f)};c();"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 35s
    restart: unless-stopped
    mem_limit: 224m
    cpus: "0.25"
    networks:
      - private

  gateway-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    command: ["node", "dist/apps/gateway-service/main"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
      CUSTOMER_SERVICE_HOST: customer-order-service
      INVENTORY_SERVICE_HOST: inventory-delivery-service
      ADMIN_SERVICE_HOST: admin-control-service
      VPN_CONFIG_SERVICE_HOST: vpn-config-engine-service
      STORE_SERVICE_HOST: store-engine-service
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID:?ADMIN_CHAT_ID is required}
      DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-RUB}
    depends_on:
      db:
        condition: service_healthy
      prisma-seed:
        condition: service_completed_successfully
      customer-order-service:
        condition: service_healthy
      inventory-delivery-service:
        condition: service_healthy
      admin-control-service:
        condition: service_healthy
      vpn-config-engine-service:
        condition: service_healthy
      store-engine-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/v1/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    mem_limit: 256m
    cpus: "0.30"
    networks:
      - private
      - dokploy-public
    labels:
      traefik.enable: "true"
      traefik.docker.network: "dokploy-network"
      traefik.http.routers.swimvpn-api.rule: "Host(`api.swimvpn.pro`)"
      traefik.http.routers.swimvpn-api.entrypoints: "websecure"
      traefik.http.routers.swimvpn-api.tls: "true"
      traefik.http.routers.swimvpn-api.tls.certresolver: "letsencrypt"
      traefik.http.routers.swimvpn-api.service: "swimvpn-api"
      traefik.http.services.swimvpn-api.loadbalancer.server.port: "3000"
      traefik.http.routers.swimvpn-admin.rule: "Host(`admin.swimvpn.pro`)"
      traefik.http.routers.swimvpn-admin.entrypoints: "websecure"
      traefik.http.routers.swimvpn-admin.tls: "true"
      traefik.http.routers.swimvpn-admin.tls.certresolver: "letsencrypt"
      traefik.http.routers.swimvpn-admin.service: "swimvpn-admin"
      traefik.http.services.swimvpn-admin.loadbalancer.server.port: "3000"

